<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 160">
  <defs>
    <linearGradient id="gdH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="30%"  stop-color="#F2F0EA"/>
      <stop offset="75%"  stop-color="#E2E0D8"/>
      <stop offset="100%" stop-color="#D4D2CC"/>
    </linearGradient>
    <linearGradient id="gdT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3ABDD8"/>
      <stop offset="35%"  stop-color="#1A8BA5"/>
      <stop offset="100%" stop-color="#116778"/>
    </linearGradient>
    <linearGradient id="gdTF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#44C7E0"/>
      <stop offset="36%"  stop-color="#1E96B4"/>
      <stop offset="100%" stop-color="#14728A"/>
    </linearGradient>
    <linearGradient id="gdRNS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#EEECEA"/>
      <stop offset="100%" stop-color="#D8D6D0"/>
    </linearGradient>
  </defs>

  <!-- All components share centre-line Y = 80 (viewBox height 160) -->

  <!-- Main housing (white/light grey body) — y=36 h=88 → centre 80 -->
  <rect x="226" y="36" width="366" height="88" rx="18" fill="url(#gdH)"/>
  <rect x="236" y="37" width="346" height="22" rx="16" fill="rgba(255,255,255,0.72)"/>
  <rect x="236" y="119" width="346" height="4"  rx="3"  fill="rgba(0,0,0,0.04)"/>
  <!-- grip ribbing -->
  <line x1="498" y1="37" x2="498" y2="123" stroke="#C4C2BC" stroke-width="1.3"/>
  <line x1="511" y1="37" x2="511" y2="123" stroke="#C4C2BC" stroke-width="1.3"/>
  <line x1="524" y1="37" x2="524" y2="123" stroke="#C4C2BC" stroke-width="1.3"/>
  <line x1="537" y1="37" x2="537" y2="123" stroke="#C4C2BC" stroke-width="1.3"/>
  <line x1="550" y1="37" x2="550" y2="123" stroke="#C4C2BC" stroke-width="1.3"/>
  <line x1="563" y1="37" x2="563" y2="123" stroke="#C4C2BC" stroke-width="1.3"/>
  <line x1="576" y1="37" x2="576" y2="123" stroke="#C4C2BC" stroke-width="1.3"/>
  <line x1="589" y1="37" x2="589" y2="123" stroke="#C4C2BC" stroke-width="1.3"/>

  <!-- Front housing (teal) — y=32 h=96 → centre 80 -->
  <rect x="123" y="32" width="108" height="96" rx="14" fill="url(#gdTF)"/>
  <!-- inspection window -->
  <rect x="136" y="48"  width="52" height="14" rx="4"  fill="rgba(255,255,255,0.13)"/>
  <ellipse cx="177" cy="37" rx="38" ry="8.5" fill="rgba(255,255,255,0.18)"/>

  <!-- Rigid Needle Shield — y=54 h=52 → centre 80 -->
  <rect x="72" y="54" width="54" height="52" rx="8" fill="url(#gdRNS)" stroke="#CCCAC4" stroke-width="0.7"/>
  <rect x="72" y="54" width="54" height="14" rx="8" fill="rgba(255,255,255,0.55)"/>

  <!-- Needle Cap (teal pill) — y=40 h=80 → centre 80 -->
  <rect x="14" y="40" width="60" height="80" rx="30" fill="url(#gdT)"/>
  <ellipse cx="38" cy="52" rx="20" ry="8" fill="rgba(255,255,255,0.23)"/>

  <!-- Activation Button (teal) — y=36 h=88 → centre 80 -->
  <rect x="592" y="36" width="64" height="88" rx="22" fill="url(#gdT)"/>
  <ellipse cx="618" cy="48" rx="20" ry="7" fill="rgba(255,255,255,0.20)"/>

  <!-- Subtle centre-line glow (looks great on dark panel background) -->
  <ellipse cx="340" cy="80" rx="290" ry="44" fill="rgba(26,139,165,0.06)"/>
</svg>
